<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SBrandOps — One System. Smarter Growth.</title>
  <meta name="description" content="SBrandOps — AI-powered Brand Operating System. Manage your brand, content, social, ads, SEO, and analytics in one smart growth system." />
  <meta name="theme-color" content="#070B1F" />

  <!-- Favicons -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
  <link rel="apple-touch-icon" href="/brand/icons/apple-touch-icon.png" />

  <!-- Fonts: Inter (primary) + Tajawal (Arabic) + Sora (brand accent) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Tajawal:wght@300;400;500;700;800&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <!-- Base styles (Tailwind + brand tokens) -->
  <link rel="stylesheet" href="/index.css" />

  <style>
    /* Critical: prevent FOUC on dark backgrounds */
    html.dark body { background-color: #070B1F; }
    html.dark #root { background-color: #070B1F; }

    /* Material Symbols base */
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      vertical-align: middle;
      font-size: 1.25rem;
    }

    /* Custom scrollbar — official navy palette */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #070B1F; }
    ::-webkit-scrollbar-thumb { background: #1F2540; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #06B6D4; }
    * { scrollbar-width: thin; scrollbar-color: #1F2540 #070B1F; }
  </style>
</head>

<body class="bg-surface-low text-on-surface">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>

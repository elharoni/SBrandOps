<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">

<head><meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SBrandOps - Social Ops Module</title>
  <!-- Tailwind is now processed by PostCSS/Vite at build time via index.css -->
  <!-- Theme tokens live in tailwind.config.js — no CDN, no runtime bloat -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <style>
    /* ── Lumina Axiom: Midnight Theme ───────────────────────────────── */
    body {
      font-family: 'Inter', 'Tajawal', sans-serif;
      background:
        radial-gradient(circle at top right, rgba(37, 99, 235, 0.10), transparent 28%),
        radial-gradient(circle at bottom left, rgba(3, 181, 211, 0.10), transparent 24%),
        var(--color-bg);
      color: var(--color-text);
      -webkit-font-smoothing: antialiased;
      transition: background-color 180ms ease, color 180ms ease;
    }

    :root {
      --color-bg:             #edf2f7;
      --color-card:           #ffffff;
      --color-text:           #0f172a;
      --color-text-secondary: #64748b;
      --color-border:         #dbe4f0;
    }

    html.dark {
      --color-bg:             #0c1321;
      --color-card:           #151b2a;
      --color-text:           #dce2f6;
      --color-text-secondary: #c3c6d7;
      --color-border:         #232a39;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #070e1c; }
    ::-webkit-scrollbar-thumb { background: #232a39; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #2563eb; }
    * { scrollbar-width: thin; scrollbar-color: #232a39 #070e1c; }

    /* Material Symbols */
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      vertical-align: middle;
      font-size: 1.25rem;
    }

    /* Glass AI effect */
    .glass-ai {
      background: rgba(46, 53, 68, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    /* Insight chip glow */
    .insight-chip {
      background: #007d55;
      box-shadow: 0 0 15px rgba(78, 222, 163, 0.3);
    }
  </style>
  <link rel="stylesheet" href="/index.css">
</head>

<body class="bg-surface-low text-on-surface">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
